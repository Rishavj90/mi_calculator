<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" type="text/css" href="../Style/style_cal.css">
</head>
<body>
    <div class="left">
        <input class="operator_input">
        <div class="input_block">
            <input class="num_input" placeholder="Numbers">
            <input class="num_input" placeholder="Numbers">
            <div class="output">answer</div>
        </div>
    </div>
    <div class="right">
        <div class="numpad">
            <div class="row">
                <div class="buttons">1</div>
                <div class="buttons">2</div>
                <div class="buttons">3</div>
            </div>
            
            <div class="row">
                <div class="buttons">4</div>
                <div class="buttons">5</div>
                <div class="buttons">6</div>
            </div>
            <div class="row">
                <div class="buttons">7</div>
                <div class="buttons">8</div>
                <div class="buttons">9</div>
            </div>
            <div class="row">
                <div class="buttons">.</div>
                <div class="buttons">0</div>
                <div class="fun_button">^0^</div>
            </div>
        </div>
        <div class="operators">
            <div class="operator_buttons">+</div>
            <div class="operator_buttons">-</div>
            <div class="operator_buttons">*</div>
            <div class="operator_buttons">/</div>
        </div>
    </div>
    <script src="../Script/script_cal.js"></script>
</body>
</html>
